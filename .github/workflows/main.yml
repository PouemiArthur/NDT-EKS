name: deploy NDT to kubernetes cluster

on:
  push:
    branches: [ master ]

jobs:
  provision-infra:
    runs-on: self-hosted
    steps:
      - name: checkout files
        uses: actions/checkout@v4

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: cache terraform modules and providers
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }} 
          restore-keys: terraform-

      - name: provision AWS and EKS infrastructure
        run: |
          terraform -chdir=./terraform init
          terraform -chdir=./terraform apply -auto-approve

      - name: install aws load balancer controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=ndt-cluster \
            --set serviceAccount.create=true \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ secrets.LBC_ROLE_ARN }}

  build-and-push:
    runs-on: self-hosted
    needs: provision-infra
    steps:
      - name: checkout files
        uses: actions/checkout@v4

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: build docker images
        run: |
          docker build -t backend:1.0.0 ./backend
          docker build -t frontend:1.0.0 ./frontend
          docker build -t nginx:1.0.0 ./nginx

      - name: tag and push images to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ndt-image-repo
        run: |
          docker tag backend:1.0.0  $ECR_REGISTRY/$ECR_REPO:backend-1.0.0
          docker tag frontend:1.0.0 $ECR_REGISTRY/$ECR_REPO:frontend-1.0.0
          docker tag nginx:1.0.0    $ECR_REGISTRY/$ECR_REPO:nginx-1.0.0

          docker push $ECR_REGISTRY/$ECR_REPO:backend-1.0.0
          docker push $ECR_REGISTRY/$ECR_REPO:frontend-1.0.0
          docker push $ECR_REGISTRY/$ECR_REPO:nginx-1.0.0

  start-deployment:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: checkout files
        uses: actions/checkout@v4

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: configure kubectl for EKS
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

          # - name: deploy to EKS cluster
          # env:
