          # export ECR_BACKEND_IMAGE=$ECR_REGISTRY/$ECR_REPO:backend-1.0.0
          # export ECR_FRONTEND_IMAGE=$ECR_REGISTRY/$ECR_REPO:frontend-1.0.0
          # export ECR_NGINX_IMAGE=$ECR_REGISTRY/$ECR_REPO:nginx-1.0.0

